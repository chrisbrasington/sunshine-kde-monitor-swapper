# Sunshine monitor config. Sourced by sunshine_connect.sh and sunshine_disconnect.sh.
# Find output names + supported modes with: kscreen-doctor -o

# Monitor that Sunshine streams from. Made primary on connect.
STREAM_MONITOR="HDMI-A-1"

# Resolution+refresh for the stream monitor while streaming.
STREAM_MODE="1280x800@60"

# Resolution+refresh to restore the stream monitor to after disconnect.
RESTORE_MODE="1920x1080@60"

# Monitor to make primary again after disconnect.
PRIMARY_MONITOR="DP-3"
